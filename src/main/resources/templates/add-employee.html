<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Employee</title>

    <style>

        body{

            margin:0;
            padding:0;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                    135deg,
                    #89f7fe,
                    #66a6ff
            );

            font-family:Arial;
        }

        .container{

            background:white;
            padding:40px;

            border-radius:15px;

            width:350px;

            box-shadow:0 0 15px rgba(0,0,0,0.3);

            text-align:center;
        }

        input{

            width:90%;
            padding:10px;

            margin:10px 0;

            border-radius:5px;
            border:1px solid gray;
        }

        button{

            padding:10px 20px;

            background:#4CAF50;
            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Add Employee</h2>

    <form action="/save" method="post">

        <input type="text"
               name="name"
               placeholder="Enter Name">

        <input type="text"
               name="department"
               placeholder="Enter Department">

        <input type="text"
               name="salary"
               placeholder="Enter Salary">

        <br><br>

        <button type="submit">
            Save
        </button>

    </form>

</div>

</body>
</html>
