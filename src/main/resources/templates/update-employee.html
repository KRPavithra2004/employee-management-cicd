<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Update Employee</title>

    <style>

        body{

            margin:0;
            padding:0;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                    135deg,
                    #ff9a9e,
                    #fad0c4
            );

            font-family:Arial;
        }

        .container{

            background:white;

            padding:40px;

            border-radius:15px;

            width:350px;

            box-shadow:0 0 15px rgba(0,0,0,0.3);

            text-align:center;
        }

        input{

            width:90%;
            padding:10px;

            margin:10px 0;

            border-radius:5px;
            border:1px solid gray;
        }

        button{

            padding:10px 20px;

            background:#4CAF50;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Update Employee</h2>

    <form action="/save"
          method="post"
          th:object="${employee}">

        <input type="hidden"
               th:field="*{id}">

        <input type="text"
               th:field="*{name}">

        <input type="text"
               th:field="*{department}">

        <input type="text"
               th:field="*{salary}">

        <br><br>

        <button type="submit">
            Update
        </button>

    </form>

</div>

</body>
</html>
