<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Management</title>

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                    135deg,
                    #74ebd5,
                    #ACB6E5
            );

            font-family:Arial;
        }

        .container{

            width:80%;
            background:white;
            padding:30px;

            border-radius:15px;

            box-shadow:0 0 15px rgba(0,0,0,0.3);

            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table,th,td{
            border:1px solid gray;
        }

        th,td{
            padding:12px;
            text-align:center;
        }

        th{
            background:#4CAF50;
            color:white;
        }

        a{
            text-decoration:none;
            padding:8px 15px;
            background:#4CAF50;
            color:white;
            border-radius:5px;
            margin:5px;
        }

        a:hover{
            background:#45a049;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Employee Management System</h2>

    <br>

    <a href="/add">Add Employee</a>

    <br><br>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Actions</th>
        </tr>

        <tr th:each="emp : ${employees}">

            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.department}"></td>
            <td th:text="${emp.salary}"></td>

            <td>

                <a th:href="@{/edit/{id}(id=${emp.id})}">
                    Edit
                </a>

                <a th:href="@{/delete/{id}(id=${emp.id})}">
                    Delete
                </a>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
